version: '3.8'
services:
  db:
    image: postgres:16
    container_name: healthtech-db
    restart: always
    environment:
      POSTGRES_USER: henrique
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: triage_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin: # Interface visual para administrar o banco de dados
    image: dpage/pgadmin4
    container_name: healthtech-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"

volumes:
  pgdata: